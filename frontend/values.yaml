# sake-hackのデフォルト値
replicaCount: 2

image:
  # パブリックリポジトリのイメージ参照
  repository: ghcr.io/sake-kasu/sake-hack-frontend
  pullPolicy: IfNotPresent
  tag: "git-8d0a1765c417507e8c24421fd25c492e07412768"

imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  # nginxinc/nginx-unprivileged イメージ内の nginx ユーザー(UID/GID 101)に合わせる
  runAsUser: 101
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  # frontendのentrypointが起動時に env-config.js を生成するため書き込みを許可
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/issuer: "sake-hack-letsencrypt"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: web.sake-hack.com
      paths:
        # /api 配下は backend Service へルーティング
        - path: /api
          pathType: Prefix
          serviceName: sake-hack-backend
          servicePort: 80
        - path: /
          pathType: Prefix
  tls:
    - secretName: sake-hack-frontend-tls
      hosts:
        - web.sake-hack.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# アプリケーションのSecret
secrets:
  # trueの場合はこのチャートがSecretを作成
  enabled: false
  # enabled=false時は既存Secretを参照（必要な場合のみ指定）
  existingSecretName: ""
  # enabled=true時に作成するSecret名（未指定なら <release>-<chart>-secrets）
  name: ""
  # 平文で扱うキー（KubernetesのstringDataへ展開）
  stringData: {}
    # 例:
    # OAUTH_CLIENT_SECRET: ""
  # 後方互換: dataキーも利用可能（値は自動でbase64化）
  data: {}
    # 例:
    # LEGACY_TOKEN: ""

# 機密性の低い設定用のConfigMap
configMap:
  enabled: true
  # 未指定なら <release>-<chart>-config
  name: ""
  data: {}
    # ここに設定のキーバリューペアを追加
    # 例:
    # LOG_LEVEL: "info"
    # APP_ENV: "production"

# LivenessプローブとReadinessプローブ
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# cert-manager設定
certManager:
  enabled: true
  issuer:
    # テスト用には 'letsencrypt-staging' を使用
    name: sake-hack-letsencrypt
    # オプション: ClusterIssuer または Issuer
    kind: Issuer
