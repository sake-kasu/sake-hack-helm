{{- if .Values.configMap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sake-hack.configMapName" . }}
  labels:
    {{- include "sake-hack.labels" . | nindent 4 }}
{{- if .Values.configMap.data }}
data:
  {{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
